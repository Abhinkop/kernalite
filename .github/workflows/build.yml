name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Docker Build
      uses: docker/setup-buildx-action@v4

    # Builds your container and automatically handles GitHub Actions caching
    - name: Build and Cache Docker Image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: .devcontainer/Dockerfile
        tags: kernel-dev-env:latest
        outputs: type=docker,dest=/tmp/kernel-dev-env.tar
        # Todo: Consider using a more specific cache key strategy for better cache hits across branches and PRs
        cache-from: type=gha,scope=kernel-shared-cache
        cache-to: type=gha,mode=max,scope=kernel-shared-cache

    # Shares the compiled image archive with the next job stage
    - name: Upload Docker Image Archive
      uses: actions/upload-artifact@v7
      with:
        name: docker-image
        path: /tmp/kernel-dev-env.tar
        retention-days: 1

  build-kernel:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Download Docker Image Archive
      uses: actions/download-artifact@v4
      with:
        name: docker-image
        path: /tmp

    # Instantly loads the environment created in Stage 1 without rebuilding anything
    - name: Load Docker Image
      run: docker load -i /tmp/kernel-dev-env.tar

    - name: Run Clang-Tidy Linter
      run: docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace kernel-dev-env:latest make clang-tidy > tidy.errors 2>&1

    - name: Verify Clang-Tidy Output
      run: |
        if grep -E "warning:|error:" tidy.errors; then
          echo "::error::❌ Clang-Tidy violations detected!"
          cat tidy.errors
          exit 1
        else
          echo "✅ Clang-Tidy passed cleanly."
        fi

    - name: Build Kernel
      run: docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace kernel-dev-env:latest make all

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v7
      with:
        name: kernel-binary
        path: build/images/Image
        retention-days: 1

    - name: Upload Clang-Tidy Log Artifact
      if: always() # Guarantees logs upload even if your tests crash or fail
      uses: actions/upload-artifact@v7
      with:
        name: clang-tidy-log
        path: tidy.errors
        retention-days: 1

  build-test-kernel:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Download Docker Image Archive
      uses: actions/download-artifact@v4
      with:
        name: docker-image
        path: /tmp

    # Instantly loads the environment created in Stage 1 without rebuilding anything
    - name: Load Docker Image
      run: docker load -i /tmp/kernel-dev-env.tar

    - name: Run Clang-Tidy Linter (Test Build)
      run: docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace kernel-dev-env:latest make clang-tidy TEST=1 > tidy-test.errors 2>&1

    - name: Verify Clang-Tidy Output (Test Build)
      run: |
        if grep -E "warning:|error:" tidy-test.errors; then
          echo "::error::❌ Clang-Tidy test build violations detected!"
          cat tidy-test.errors
          exit 1
        else
          echo "✅ Clang-Tidy test build passed cleanly."
        fi

    - name: Build Kernel
      run: docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace kernel-dev-env:latest make all TEST=1

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v7
      with:
        name: kernel-test-binary
        path: build/images/Image
        retention-days: 1

    - name: Upload Clang-Tidy Test Log Artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: clang-tidy-test-log
        path: tidy-test.errors
        retention-days: 1

  execute-qemu:
    runs-on: ubuntu-latest
    needs: build-kernel
    steps:
    - name: Install Native QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-system-arm

    - name: Download Kernel Artifact
      uses: actions/download-artifact@v4
      with:
        name: kernel-binary
        path: .
    - name: Execute QEMU Internal Tests
      run: |
        timeout 30s qemu-system-aarch64 \
          -machine virt \
          -cpu cortex-a57 \
          -nographic \
          -kernel ./Image \
          -no-reboot \
          -semihosting > test_results.log

    - name: Upload Test Results Log
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: qemu-test-log
        path: test_results.log
        retention-days: 1

  execute-qemu-tests:
    runs-on: ubuntu-latest
    needs: build-test-kernel
    steps:
    - name: Install Native QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-system-arm

    - name: Download Kernel Artifact
      uses: actions/download-artifact@v4
      with:
        name: kernel-test-binary
        path: .
    - name: Execute QEMU Internal Tests
      run: |
        timeout 30s qemu-system-aarch64 \
          -machine virt \
          -cpu cortex-a57 \
          -nographic \
          -kernel ./Image \
          -no-reboot \
          -semihosting > test_results.log

    - name: Upload Test Results Log
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: qemu-test-log
        path: test_results.log
        retention-days: 1
